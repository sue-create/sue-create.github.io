<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY</title>
    <link rel="stylesheet" href="mystyle.css">
</head>
<body>
    <!-- 헤더 -->
    <header>
        <h2>00's STUDY</h2>
        2024년 학습하고 있는 내용입니다.
    </header>
    <!-- 목차만들기 -->
    <nav>
        <h2>프로그래밍</h2>
        <ol>
            <li>웹프로그래밍</li>
            <li>파이썬</li>
            <li>인공지능</li>
            <li>생성형 AI</li>
        </ol>
        <h2>기타</h2>
        <ol>
            <li>영어</li>
            <li>자격증</li>
        </ol>
    </nav>
    <!-- 섹션 -->
    <section>
        <article id="webpg">
            <h2>웹프로그래밍 소개</h2>
            <form action="">
                -이름 : <input type="text"><br>
                -password : <input type="password">
                <input type="submit" value="확인" name="btn1"/><br>
                -자바스크립트 학습 경험 <input type="radio" name="study" value="yes">있다
                <input type="radio" name="study" value="no">없다 <br>
                -학습한 언어 선택 <input type="checkbox" name="lang" value="HTML">HTML
                <input type="checkbox" name="lang" value="CSS">CSS
                <input type="checkbox" name="lang" value="JavaScript">JavaScript <br>
                -학년 <input type="number" min="2" max="4" step="1" value="2"> <br>
                -프로그래밍 스킬 <input type="range" min="1" max="10" value="1"> <br>
                학습방법에 대한 조언 한마디 <br>
                <textarea name="feedback" id="" cols="30" rows="5"></textarea>
            </form>
        </article>
        <article id="python">
            <h2>파이썬 소개 및 정리</h2>
        </article>
        <article id="AI">
            <h2>인공지능 소개 및 정리</h2>
        </article>

    </section>
    <footer>
        바닥글
    </footer>

    
</body>
</html>
